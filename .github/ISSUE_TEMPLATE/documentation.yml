name: Documentation issue
description: Report something wrong, missing, or unclear in the docs, README, or in-app help.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Docs bugs are real bugs — thanks for flagging this.

  - type: dropdown
    id: where
    attributes:
      label: Where
      options:
        - README
        - CONTRIBUTING
        - SECURITY
        - CODE_OF_CONDUCT
        - .env.example
        - In-app help / admin panel text
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location / link
      description: Direct link, file path, or section heading.
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: What's wrong or missing
    validations:
      required: true

  - type: textarea
    id: suggested-fix
    attributes:
      label: Suggested fix
      description: Optional. Proposed wording or the correct information.
    validations:
      required: false
